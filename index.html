<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Job Finder Vaud V8.2</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:white;
}

h1{
text-align:center;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:20px;
}

.counter{
background:#1e293b;
padding:12px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
font-weight:bold;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
margin-bottom:20px;
}

.section{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.tag{
background:#334155;
padding:10px 14px;
border-radius:30px;
cursor:pointer;
}

.tag.active{
background:#f97316;
}

.badge{
display:inline-block;
background:#ea580c;
padding:5px 10px;
border-radius:15px;
font-size:12px;
margin-top:8px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
color:white;
}

.btn-search{
background:#f97316;
}

.btn-reset{
background:#ef4444;
}

.offre{
background:#1e293b;
padding:18px;
border-radius:15px;
margin-bottom:15px;
}

.favori{
float:right;
font-size:24px;
cursor:pointer;
}

.postuler{
display:block;
margin-top:15px;
padding:12px;
text-align:center;
background:#10b981;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🔎 Job Finder Vaud V8.2</h1>

<div class="subtitle">
Smart Job Search for Vaud
</div>

<div class="counter" id="compteur">
📊 0 offre(s)
</div>

<input
class="search"
id="search"
placeholder="🔍 Rechercher un emploi..."
>

<div class="section">
<h3>💼 Métiers</h3>
<div class="tags" id="metiers"></div>
</div>

<div class="section">
<h3>⏰ Taux</h3>
<div class="tags" id="taux"></div>
</div>

<div class="section">
<h3>📍 Régions</h3>
<div class="tags" id="regions"></div>
</div>

<div class="section">
<h3>🏢 Secteurs</h3>
<div class="tags" id="secteurs"></div>
</div>

<div class="section">
<h3>📅 Publication</h3>
<div class="tags" id="publication"></div>
</div>

<div class="section">
<h3>📄 Contrat</h3>
<div class="tags" id="contrat"></div>
</div>

<div class="section">
<h3>🌐 Sites</h3>
<div class="tags" id="sites"></div>

<div class="buttons">

<button class="btn btn-search" id="rechercher">
🔎 Rechercher
</button>

<button class="btn btn-reset" id="reset">
🧹 Réinitialiser
</button>

</div>

</div>

<div id="offres"></div>

<script>

let offres = [];

let favoris = JSON.parse(
localStorage.getItem("favoris") || "[]"
);

let filtres = {
metiers: [],
taux: [],
regions: [],
secteurs: [],
sites: [],
publication: [],
contrat: []
};

fetch("/offers")
.then(r=>r.json())
.then(data=>{
offres=data;
remplirFiltres();
afficherOffres(offres);
});

function afficherOffres(data){

document.getElementById("compteur").innerHTML=
"📊 "+data.length+" offre(s) trouvée(s)";

let html="";

data.forEach(job=>{

const coeur=
favoris.includes(job.id)
? "❤️"
: "🤍";

html+=`

<div class="offre">

<div class="favori"
onclick="toggleFavori(${job.id})">
${coeur}
</div>

<h2>${job.titre}</h2>

<div>🏢 ${job.entreprise}</div>
<div>📍 ${job.lieu}</div>
<div>⏰ ${job.taux}</div>
<div>📅 ${job.publication}</div>
<div>📄 ${job.contrat}</div>

<div class="badge">
${job.secteur}
</div>

<div>💰 ${job.salaire}</div>

<p>${job.description}</p>

<div>
🎯 ${job.competences}
</div>

<a
class="postuler"
href="${job.url}"
target="_blank">
🔗 Voir l'offre
</a>

</div>

`;

});

document.getElementById("offres").innerHTML=html;

}

function toggleFavori(id){

if(favoris.includes(id)){
favoris=favoris.filter(x=>x!==id);
}else{
favoris.push(id);
}

localStorage.setItem(
"favoris",
JSON.stringify(favoris)
);

afficherOffres(offres);

}

function remplirFiltres(){

remplirListe("metiers",[
"Gestionnaire de dossiers",
"Employé de commerce",
"Assistant administratif",
"Technicien informatique",
"AI Dev",
"Secrétaire"
]);

remplirListe("taux",[
"50%",
"60%",
"70%"
]);

remplirListe("regions",[
"Lausanne",
"Morges",
"Nyon",
"Yverdon-les-Bains",
"VD"
]);

remplirListe("secteurs",[
"Administration",
"Administration publique",
"Accueil et Secrétariat",
"Fiduciaire",
"Informatique",
"Intelligence Artificielle",
"Industrie",
"Production"
]);

remplirListe("publication",[
"24h",
"3 jours",
"7 jours",
"30 jours"
]);

remplirListe("contrat",[
"Durée déterminée",
"Temporaire"
]);

remplirListe("sites",[
"Indeed",
"Jobup",
"Jobs.ch",
"JobScout24"
]);

}

function remplirListe(id,valeurs){

const zone=
document.getElementById(id);

zone.innerHTML="";

valeurs.forEach(v=>{

const actif=
filtres[id].includes(v)
? "active"
: "";

zone.innerHTML+=`
<div
class="tag ${actif}"
onclick="toggleFiltre('${id}','${v}')">
${v}
</div>
`;

});

}

function toggleFiltre(type,valeur){

if(filtres[type].includes(valeur)){
filtres[type]=
filtres[type].filter(v=>v!==valeur);
}else{
filtres[type].push(valeur);
}

remplirFiltres();
appliquerFiltres();

}

function appliquerFiltres(){

let resultat=offres.filter(o=>{

return (

(filtres.metiers.length===0 || filtres.metiers.includes(o.titre))
&&
(filtres.taux.length===0 || filtres.taux.includes(o.taux))
&&
(filtres.regions.length===0 || filtres.regions.includes(o.lieu))
&&
(filtres.secteurs.length===0 || filtres.secteurs.includes(o.secteur))
&&
(filtres.sites.length===0 || filtres.sites.includes(o.source))
&&
(filtres.publication.length===0 || filtres.publication.includes(o.publication))
&&
(filtres.contrat.length===0 || filtres.contrat.includes(o.contrat))

);

});

afficherOffres(resultat);

}

document
.getElementById("search")
.addEventListener("input",e=>{

const texte=
e.target.value.toLowerCase();

const resultat=
offres.filter(o=>

o.titre.toLowerCase().includes(texte)
||
o.entreprise.toLowerCase().includes(texte)
||
o.lieu.toLowerCase().includes(texte)

);

afficherOffres(resultat);

});

document
.getElementById("reset")
.addEventListener("click",()=>{

document.getElementById("search").value="";

filtres={
metiers:[],
taux:[],
regions:[],
secteurs:[],
sites:[],
publication:[],
contrat:[]
};

remplirFiltres();
afficherOffres(offres);

});

</script>

</body>
</html>
