<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Job Finder Vaud V7.3</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

#search{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:15px;
    font-size:16px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
}

.fav{
    float:right;
    cursor:pointer;
    font-size:24px;
}

.count{
    text-align:center;
    margin-bottom:20px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h1>📋 Job Finder Vaud V7.3</h1>

<input id="search" placeholder="Rechercher un emploi...">

<div class="count" id="count"></div>

<div id="jobs"></div>

<script>

let offres=[];

fetch('/offers')
.then(r=>r.json())
.then(data=>{
    offres=data;
    afficher(data);
});

function afficher(data){

    document.getElementById("count").innerHTML=
        data.length+" offre(s) trouvée(s)";

    let html="";

    data.forEach(job=>{

        html+=`
        <div class="card">
            <span class="fav">🤍</span>

            <h2>${job.titre}</h2>

            <p>🏢 ${job.entreprise}</p>
            <p>📍 ${job.lieu}</p>
            <p>⏰ ${job.taux}</p>

        </div>
        `;
    });

    document.getElementById("jobs").innerHTML=html;
}

document.getElementById("search")
.addEventListener("input",e=>{

    let texte=e.target.value.toLowerCase();

    let filtre=offres.filter(job=>

        job.titre.toLowerCase().includes(texte) ||
        job.entreprise.toLowerCase().includes(texte) ||
        job.lieu.toLowerCase().includes(texte)

    );

    afficher(filtre);
});

</script>

</body>
</html>
