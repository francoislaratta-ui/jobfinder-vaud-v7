name: Test Jobup Access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Jobup RSS
        run: |
          echo "Test Jobup RSS..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: application/rss+xml, text/xml, */*" \
            -H "Accept-Language: fr-CH,fr;q=0.9" \
            "https://www.jobup.ch/fr/emplois/rss/?term=assistant+administratif&region=52"

      - name: Test Jobup HTML
        run: |
          echo "Test Jobup HTML..."
          curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html" \
            -H "Accept-Language: fr-CH,fr;q=0.9" \
            "https://www.jobup.ch/fr/emplois/?term=assistant+administratif&region=52"
