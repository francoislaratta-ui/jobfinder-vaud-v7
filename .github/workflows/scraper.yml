name: Scraper Jobup + Indeed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Run scraper
        run: node .github/scripts/scraper.js

      - name: Commit offers.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add offers.json
          git diff --staged --quiet || git commit -m "🤖 Mise à jour offres $(date +'%d.%m.%Y')"
          git push