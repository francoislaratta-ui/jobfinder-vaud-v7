name: Scraper Jobup + Indeed


on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run scraper
        run: node .github/scripts/scraper.js
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Commit offers.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add offers.json
          git diff --staged --quiet || git commit -m "🤖 Mise à jour offres $(date +'%d.%m.%Y')"
          git push